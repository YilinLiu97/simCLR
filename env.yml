name: simclr
channels:
  - conda-forge
  - defaults
dependencies:
  - numpy
  - pillow
  - pip
  - python=3.10
  - tensorboard
  - matplotlib
  - scikit-learn
  - pyyaml
  - tqdm
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.11.0+cu128
      - torchvision==0.26.0+cu128
      - opencv-python-headless==4.10.0.84
